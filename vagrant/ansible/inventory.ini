# ansible_connection=local karena ansible_local menjalankan playbook
# langsung di dalam VM — tidak perlu SSH ke IP manapun
[vm-database]
192.168.56.10 ansible_connection=local

[vm-backend]
192.168.56.11 ansible_connection=local

[vm-frontend]
192.168.56.12 ansible_connection=local

[all:vars]
ansible_python_interpreter=/usr/bin/python3
