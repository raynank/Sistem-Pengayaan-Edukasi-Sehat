---
# Role: common
# Dijalankan di semua VM — install Docker + Docker Compose plugin

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install dependensi sistem
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - git
      - python3-pip
    state: present

- name: Tambah Docker GPG key
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Tambah Docker repository
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu \
    $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Update apt cache setelah tambah repo Docker
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker Engine + Docker Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Pastikan Docker service berjalan dan enable saat boot
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Tambahkan user vagrant ke group docker
  ansible.builtin.user:
    name: vagrant
    groups: docker
    append: true

- name: Buat direktori project di VM
  ansible.builtin.file:
    path: "{{ project_dir }}"
    state: directory
    owner: vagrant
    group: vagrant
    mode: "0755"
