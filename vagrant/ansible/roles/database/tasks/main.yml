---
# Role: database
# Deploy PostgreSQL 16 via Docker Compose di vm-database

- name: Salin file docker-compose database ke VM
  ansible.builtin.copy:
    src: "{{ project_dir }}/../database/docker-compose.yml"
    dest: "{{ project_dir }}/docker-compose.yml"
    owner: vagrant
    group: vagrant
    mode: "0644"
  remote_src: true

- name: Render file .env PostgreSQL dari template
  ansible.builtin.template:
    src: env.j2
    dest: "{{ project_dir }}/.env"
    owner: vagrant
    group: vagrant
    mode: "0600"

- name: Jalankan PostgreSQL container
  ansible.builtin.shell: |
    docker compose up -d
  args:
    chdir: "{{ project_dir }}"
  become: true
  become_user: vagrant

- name: Tunggu PostgreSQL siap menerima koneksi
  ansible.builtin.shell: |
    docker exec nopmo_db pg_isready -U {{ db_user }} -d {{ db_name }}
  register: pg_ready
  retries: 10
  delay: 5
  until: pg_ready.rc == 0
  changed_when: false
