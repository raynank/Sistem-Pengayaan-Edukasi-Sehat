# Rate limiting zone: max 10 request/menit per IP untuk endpoint auth
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# Redirect semua HTTP ke HTTPS
server {
    listen 80;
    server_name api.yourdomain.com;

    # ACME challenge untuk Let's Encrypt auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — reverse proxy ke Flask/Gunicorn
server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    # SSL certificates dari Let's Encrypt (Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # Protokol dan cipher yang aman
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS: browser wajib pakai HTTPS selama 1 tahun
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Auth endpoint — dibatasi rate limit untuk cegah brute force
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://flask:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Semua endpoint API lainnya
    location /api/ {
        proxy_pass         http://flask:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Tolak semua request selain /api/
    location / {
        return 404;
    }
}
