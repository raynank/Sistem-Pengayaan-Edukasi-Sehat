# Rate limiting zone: max 10 request/menit per IP untuk endpoint auth
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# HTTP server — local development (192.168.1.11)
# Untuk production dengan HTTPS, lihat komentar di bawah
server {
    listen 80;
    # vm-be Tailscale IP: 100.116.57.50
    server_name 100.116.57.50;

    # Auth endpoint — dibatasi rate limit untuk cegah brute force
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://flask:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Semua endpoint API lainnya
    location /api/ {
        proxy_pass         http://flask:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Tolak semua request selain /api/
    location / {
        return 404;
    }
}

# ============================================================
# PRODUCTION (HTTPS) — aktifkan blok ini saat deploy ke domain
# Ganti 192.168.1.11 dengan server_name api.yourdomain.com
# dan tambahkan kembali ssl_certificate + redirect HTTP→HTTPS
# ============================================================
