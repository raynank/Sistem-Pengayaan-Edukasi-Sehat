services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL backend (Nginx vm-backend)
        # Untuk production, ganti dengan: https://api.yourdomain.com/api
        NEXT_PUBLIC_API_URL: http://192.168.1.11/api
    container_name: nopmo_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
