services:
  postgres:
    image: postgres:16-alpine
    container_name: nopmo_db
    restart: unless-stopped
    env_file: .env
    ports:
      # Vagrant: bind ke IP private_network vm-database (192.168.56.10)
      # Real VM: ganti ke 192.168.1.10:5432:5432
      - "192.168.56.10:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
