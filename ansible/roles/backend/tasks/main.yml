---
# ══════════════════════════════════════════════════════════════════
# Role: backend — Setup dan jalankan Flask + Nginx di VM-Backend
# ══════════════════════════════════════════════════════════════════

- name: Generate Flask secret key
  command: python3 -c "import secrets; print(secrets.token_hex(32))"
  register: flask_secret
  changed_when: false

- name: Create .env file for Flask backend
  copy:
    dest: /home/vagrant/app/backend/.env
    content: |
      # Flask secret key
      SECRET_KEY={{ flask_secret.stdout }}

      # URL koneksi PostgreSQL di VM-Database (cc-db)
      DATABASE_URL=postgresql://internetsehat_user:internetsehat_dev_password_2026@192.168.56.10:5432/internetsehat_db
    owner: vagrant
    group: vagrant
    mode: "0600"
    force: yes

- name: Build and start Backend containers
  shell: docker compose up -d --build
  args:
    chdir: /home/vagrant/app/backend

- name: Wait for Flask container to be running
  shell: docker ps --filter "name=internetsehat_flask" --filter "status=running" -q
  register: flask_running
  retries: 12
  delay: 10
  until: flask_running.stdout != ""

- name: Wait for Database to be reachable from backend
  shell: >
    docker exec internetsehat_flask python -c
    "import psycopg2; psycopg2.connect('postgresql://internetsehat_user:internetsehat_dev_password_2026@192.168.56.10:5432/internetsehat_db')"
  register: db_check
  retries: 30
  delay: 5
  until: db_check.rc == 0
  ignore_errors: yes

- name: Initialize database (create tables + seed blacklist)
  shell: docker exec internetsehat_flask python init_db.py
  args:
    chdir: /home/vagrant/app/backend
  when: db_check.rc == 0

- name: Warn if database was not reachable
  debug:
    msg: >
      WARNING: Database not reachable. Run manually:
      vagrant ssh backend -c 'docker exec internetsehat_flask python init_db.py'
  when: db_check.rc != 0

- name: Show Backend status
  debug:
    msg: "Backend running — Nginx on 192.168.56.11:80, Flask on internal port 5000"
